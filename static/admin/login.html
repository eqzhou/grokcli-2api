<!DOCTYPE html>
<html lang="zh-CN">
<head>

  
  <script>
  /* g2a-asset-boot v2: recover at most once; never spin-reload forever */
  (function () {
    var KEY = "g2a_asset_reload_at";
    function reloadedRecently() {
      try { return (Date.now() - Number(sessionStorage.getItem(KEY) || 0)) < 60000; } catch (e) { return false; }
    }
    function markReload() {
      try { sessionStorage.setItem(KEY, String(Date.now())); } catch (e) {}
    }
    window.__g2aScriptFailed = function (el) {
      console.error("static script failed", el && el.src);
      if (!reloadedRecently()) {
        markReload();
        var u = new URL(location.href);
        u.searchParams.set("_g2a_cb", String(Date.now()));
        location.replace(u.pathname + u.search);
        return;
      }
      var d = document.getElementById("boot-desc") || document.getElementById("boot-hint");
      if (d) d.textContent = "静态资源加载失败，请点击重试";
    };
    window.__g2aBootLogin = function () {
      function show(msg) {
        try {
          var boot = document.getElementById("boot-view");
          var auth = document.getElementById("auth-view");
          if (boot) boot.classList.remove("hidden");
          if (auth) auth.classList.remove("hidden");
          var d = document.getElementById("boot-desc");
          var h = document.getElementById("boot-hint");
          if (d) d.textContent = "页面脚本未就绪";
          if (h) h.innerHTML = (msg || "") +
            '<br><button type="button" class="g2a-btn g2a-btn-primary" style="margin-top:12px" id="g2a-reload-btn">重试</button>';
          var b = document.getElementById("g2a-reload-btn");
          if (b) b.onclick = function () {
            try { sessionStorage.removeItem(KEY); } catch (e) {}
            location.replace(location.pathname + "?_g2a_cb=" + Date.now());
          };
        } catch (e) {}
      }
      // Wait a tick for deferred scripts; do NOT auto-reload unless scripts truly missing after short wait.
      var tries = 0;
      function attempt() {
        tries += 1;
        if (window.G2A && typeof G2A.api === "function" && G2A.auth && typeof G2A.auth.initLoginPage === "function") {
          try { G2A.auth.initLoginPage(); } catch (e) { show(String(e && e.message || e)); }
          return;
        }
        if (tries < 20) { setTimeout(attempt, 50); return; } // ~1s wait for script parse
        show("登录脚本加载不完整。点击重试。");
      }
      attempt();
    };
  })();
  </script>



  <script>
    // g2a-paint-lock: keep first paint continuous; never leave a blank black document.
    (function () {
      try {
        var t = localStorage.getItem("g2a_theme");
        if (t !== "light" && t !== "dark") {
          t = (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) ? "light" : "dark";
        }
        document.documentElement.setAttribute("data-theme", t);
        document.documentElement.style.colorScheme = t;
        document.documentElement.style.background = t === "light" ? "#eef3f8" : "#070a10";
        var tok = localStorage.getItem("g2a_admin_token") || "";
        var ts = Number(localStorage.getItem("g2a_admin_token_ts") || 0) || 0;
        var grace = tok && ts && (Date.now() - ts) < 7 * 24 * 3600 * 1000;
        if (tok || grace) document.documentElement.classList.add("g2a-has-session");
      } catch (e) {}
      // Safety: if soft-nav busy class somehow persisted via bfcache, clear on pageshow.
      window.addEventListener("pageshow", function () {
        try { document.body && document.body.classList.remove("g2a-softnav-busy"); } catch (_) {}
      });
      // If scripts hang, unstick busy dimmer after 12s.
      setTimeout(function () {
        try { document.body && document.body.classList.remove("g2a-softnav-busy"); } catch (_) {}
      }, 12000);
    })();
  </script>

  <script>
    // Apply theme before paint to avoid flash.
    (function () {
      try {
        var t = localStorage.getItem("g2a_theme");
        if (t !== "light" && t !== "dark") {
          t = (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) ? "light" : "dark";
        }
        document.documentElement.setAttribute("data-theme", t);
        document.documentElement.style.colorScheme = t;
        document.documentElement.style.background = t === "light" ? "#eef3f8" : "#070a10";
      } catch (e) {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    })();
  </script>

<body class="g2a-body g2a-login-body">
  <div id="toast" class="g2a-message"></div>
  <div class="g2a-login-theme-wrap">
    <button type="button" class="g2a-theme-toggle has-svg" data-theme-toggle aria-label="切换主题">
      <svg class="ico-svg is-active" data-theme-icon="sun" viewBox="0 0 20 20" fill="none" aria-hidden="true"><circle cx="10" cy="10" r="3.2" stroke="currentColor" stroke-width="1.6"/><path d="M10 2.8v1.6M10 15.6v1.6M2.8 10h1.6M15.6 10h1.6M4.9 4.9l1.1 1.1M14 14l1.1 1.1M15.1 4.9l-1.1 1.1M6 14l-1.1 1.1" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      <svg class="ico-svg" data-theme-icon="moon" viewBox="0 0 20 20" fill="none" aria-hidden="true"><path d="M12.6 3.4A6.8 6.8 0 1 0 16.6 13a5.6 5.6 0 0 1-4-9.6Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
      <span class="ico">☀️</span><span class="label">白天</span>
    </button>
  </div>

  <div class="g2a-login-shell">
    <main class="g2a-login-main">
      <div id="auth-view" class="g2a-login-screen g2a-login-screen-embed">
        <section class="g2a-login-panel g2a-card" aria-labelledby="auth-title">
          <div class="g2a-login-brand">
            <div class="g2a-logo g2a-logo-lg">G</div>
            <div>
              <div class="g2a-brand-title">grokcli-2api</div>
              <div class="g2a-brand-sub">OpenAI · Anthropic 兼容网关</div>
            </div>
          </div>

          <div class="g2a-page-kicker">ADMIN ACCESS · SIGNAL</div>
          <h1 id="auth-title" class="g2a-login-title">登录管理台</h1>
          <p id="auth-desc" class="g2a-muted g2a-login-desc">使用管理员密码进入安全运维控制台。</p>
          <div class="g2a-login-chips" aria-hidden="true">
            <span class="g2a-login-chip">OAI · Anthropic</span>
            <span class="g2a-login-chip">Round-robin pool</span>
            <span class="g2a-login-chip">Live telemetry</span>
          </div>

          <div id="boot-view" class="g2a-login-probe" role="status" aria-live="polite">
            <span class="g2a-spinner" aria-hidden="true"></span>
            <div>
              <div id="boot-desc" class="g2a-login-probe-title">正在检测服务</div>
              <div id="boot-hint" class="g2a-login-probe-copy">确认管理鉴权与数据服务状态</div>
            </div>
          </div>

          <div id="auth-conn" class="g2a-conn-list g2a-conn-list-compact"></div>

          <form id="auth-form" class="g2a-login-form" autocomplete="on">
            <label class="g2a-label" for="auth-password">管理员密码</label>
            <input id="auth-password" name="password" type="password" class="g2a-input g2a-input-lg"
                   placeholder="请输入管理员密码" autocomplete="current-password" required minlength="4" />
            <div id="auth-error" class="g2a-form-error hidden"></div>
            <button class="g2a-btn g2a-btn-primary g2a-btn-lg g2a-btn-block" id="auth-submit" type="submit">
              登录并连接数据
            </button>
          </form>

          <div class="g2a-login-foot">
            <button type="button" class="g2a-link-btn" id="auth-refresh">重新检测连接</button>
            <a class="g2a-link-btn" href="/health" target="_blank" rel="noopener">/health</a>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script src="/static/dist/utils.e0a95cf6ed.js" onerror="window.__g2aScriptFailed&&__g2aScriptFailed(this)"></script>
  <script src="/static/dist/api.1bf56e45fe.js" onerror="window.__g2aScriptFailed&&__g2aScriptFailed(this)"></script>
  <script src="/static/dist/state.da9974e23b.js" onerror="window.__g2aScriptFailed&&__g2aScriptFailed(this)"></script>
  <script src="/static/dist/auth.4eb51a7835.js" onerror="window.__g2aScriptFailed&&__g2aScriptFailed(this)"></script>
  <script>document.addEventListener("DOMContentLoaded", function(){ window.__g2aBootLogin && __g2aBootLogin(); });</script>
</body>
